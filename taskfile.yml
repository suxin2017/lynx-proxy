version: "3"

tasks:
  generate-ws-protocol:
    desc: Generate WS protocol artifacts for backend and ui
    cmds:
      - node scripts/ws-generate-rust.mjs
      - cd ui && npm run ws:generate

  dev:
    desc: Run development server
    deps: [dev-lynx-server, dev-ui]

  test:
    desc: Run tests
    dir: crates/lynx-core
    cmds:
      - cargo test

  lint:
    desc: Run clippy linter
    cmds:
      - cargo clippy --all-targets --all-features -- -D warnings

  fix:
    desc: Run cargo fix
    cmds:
      - cargo fix --allow-dirty

  fmt:
    desc: Run cargo fmt
    cmds:
      - cargo fmt --all -- --check

  setup-rust:
    desc: Setup dev environment
    cmds:
      - sudo apt install build-essential
      - cargo install cargo-release
      - cargo install git-cliff

  setup-ui:
    desc: Setup UI dependencies
    dir: ui
    cmds:
      - npm ci

  dev-ui:
    desc: Run UI in development mode
    dir: ui
    cmds:
      - npm run dev

  build-ui:
    desc: Build UI
    cmds:
      - cd ui && npm ci && npm run build
      - rm -rf crates/lynx-cli/assets
      - cp -r ui/dist/ crates/lynx-cli/assets

  build-server:
    desc: Build server
    cmds:
      - cargo build --release

  build:
    desc: Build UI and server
    cmds:
      - task: build-ui
      - task: build-server

  dev-lynx-server:
    desc: Start test server
    dir: crates/lynx-core
    cmds:
      - cargo run --package lynx-core --example proxy_server_example

  traffic-sample:
    desc: Send realistic mixed HTTP(S) traffic through the local proxy (for Network UI)
    cmds:
      - bash scripts/traffic-sample.sh {{.CLI_ARGS}}

  traffic-sample:simple:
    desc: Send simple GET-only traffic through the proxy
    cmds:
      - bash scripts/traffic-sample.sh --simple {{.CLI_ARGS}}

  traffic-sample:realistic:
    desc: Send 40 varied requests (methods, headers, errors, cookies, redirects)
    cmds:
      - bash scripts/traffic-sample.sh --realistic --count 40 --delay 0.15

  traffic-sample:https:
    desc: Send realistic traffic over HTTPS only (-k)
    cmds:
      - bash scripts/traffic-sample.sh --https {{.CLI_ARGS}}

  traffic-sample:burst:
    desc: Send 100 realistic requests through the proxy
    cmds:
      - bash scripts/traffic-sample.sh --count 100 --delay 0.08

  traffic-mock:
    desc: Send HTTP(S) traffic through proxy to local lynx-mock server
    cmds:
      - bash scripts/traffic-mock.sh {{.CLI_ARGS}}

  readme-demo:
    desc: Seed proxy with demo traffic, WebSocket, and rules for README screenshots
    cmds:
      - bash scripts/readme-demo.sh

  readme-screenshots:
    desc: Capture README UI screenshots (requires dev + readme-demo)
    dir: ui
    cmds:
      - node ../scripts/capture-readme-screenshots.mjs

  release-minor:
    deps: [update-main-branch, build-ui, test]
    desc: Release minor version
    cmds:
      - cargo release minor --execute
      - task: generate-change-log

  release-patch:
    deps: [update-main-branch, build-ui, test]
    desc: Release patch version
    cmds:
      - cargo release patch --execute
      - task: generate-change-log

  release-alpha:
    deps: [update-main-branch, build-ui, test]
    desc: Release alpha version
    cmds:
      - cargo release alpha --execute
      - task: generate-change-log

  generate-change-log:
    desc: Generate change log
    cmds:
      - git cliff -o CHANGELOG.md
      - git add .
      - 'git commit -m"chore: Update CHANGELOG.md" --no-verify || true'
      - git push

  update-main-branch:
    desc: Update remote branch
    cmds:
      - git pull origin main

  publish:
    desc: Publish to crates.io
    cmds:
      - task: build-ui
      - cargo publish --registry crates-io -p lynx-core
      - cargo publish --registry crates-io -p lynx-cli --allow-dirty
