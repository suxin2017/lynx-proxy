name: Build ui

inputs:
  github-token:
    description: 'GitHub token for API access'
    required: true

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Cache npm store
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-npm-${{ hashFiles('ui/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-npm-
          
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: "npm"
        cache-dependency-path: ui/package-lock.json

    - name: Install Task
      uses: arduino/setup-task@v2
      with:
        version: 3.x
        repo-token: ${{ inputs.github-token }}

    - name: Cache build output
      uses: actions/cache@v4
      with:
        path: |
          ui/dist
          crates/lynx-cli/assets
        key: ${{ runner.os }}-build-${{ hashFiles('ui/src/**', 'ui/index.html', 'ui/package.json') }}
        restore-keys: |
          ${{ runner.os }}-build-

    - name: npm Install
      run: task setup-ui
      shell: bash

    - name: npm Build
      run: task build-ui
      shell: bash
