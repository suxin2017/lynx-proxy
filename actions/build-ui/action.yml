name: Build ui

inputs:
  github-token:
    description: 'GitHub token for API access'
    required: true

runs:
  using: "composite"
  steps:
    - name: Cache npm store
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-npm-${{ hashFiles('ui/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-npm-

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        package-manager: npm
        package-manager-version: "10.9.8"

    - name: Install Task
      uses: arduino/setup-task@v2
      with:
        version: 3.x
        repo-token: ${{ inputs.github-token }}

    - name: Cache build output
      uses: actions/cache@v4
      with:
        path: |
          ui/dist
          crates/lynx-cli/assets
        key: ${{ runner.os }}-build-${{ hashFiles('ui/src/**', 'ui/index.html', 'ui/package.json', 'ui/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-build-

    - name: npm Install
      working-directory: ui
      run: npm install
      shell: bash

    - name: npm Build
      working-directory: ui
      run: npm run build
      shell: bash

    - name: Copy UI assets
      run: |
        rm -rf crates/lynx-cli/assets
        cp -r ui/dist/ crates/lynx-cli/assets
      shell: bash
